# ILoveJSON - File cleanup cron
# Purge uploaded and converted files older than 30 minutes
# Install: crontab crontab.conf

# Run every 15 minutes
*/15 * * * * find /var/www/ilovejson.com/public/uploads -type f -mmin +30 -delete 2>/dev/null
*/15 * * * * find /var/www/ilovejson.com/public/downloads -type f -mmin +30 -delete 2>/dev/null

# Clean empty subdirectories daily at 3am
0 3 * * * find /var/www/ilovejson.com/public/uploads -type d -empty -delete 2>/dev/null
0 3 * * * find /var/www/ilovejson.com/public/downloads -type d -empty -delete 2>/dev/null
