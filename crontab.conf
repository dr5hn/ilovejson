# Delete temporary upload and download files older than 30 minutes.
# public/saved/ is EXCLUDED — those files are user-owned and permanent.
*/30 * * * * find /path/to/ilovejson/public/uploads -mindepth 2 -mmin +30 -type f -delete
*/30 * * * * find /path/to/ilovejson/public/downloads -mindepth 2 -mmin +30 -type f -delete
